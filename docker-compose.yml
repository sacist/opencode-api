services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./.env:/app/.env
      - ./config:/app/config
      - data:/app/data
      - ./logs:/app/logs
      - ./workspaces:/app/workspaces
    command: ["sh", "-c", "npm run init && npm run start"]
    restart: unless-stopped

volumes:
  data: